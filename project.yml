name: AIThings
options:
  bundleIdPrefix: net.things-connect
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  AIThings:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: "AI-Things"
        PRODUCT_BUNDLE_IDENTIFIER: net.things-connect.aithings
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # The app runs git/shell/claude via Process, so it is NOT sandboxed.
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_CFBundleDisplayName: "AI-Things"
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 things-connect.net — MIT License"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
